{% extends "admin/base.html" %}

{% block title %}改写文章 - AutoPlatform{% endblock %}
{% block page_title %}改写文章{% endblock %}

{% block content %}
<div class="rewrite-container">
    <!-- 左侧：文章内容 -->
    <div class="rewrite-main">
        <div class="card">
            <div class="card-header">
                <h3>原文内容</h3>
                <span class="text-muted" id="articleIdDisplay"></span>
            </div>
            <div class="card-body">
                <div class="article-info">
                    <h4 id="articleTitle"></h4>
                    <p id="articleAuthor" class="text-muted"></p>
                </div>
                <div class="article-content" id="articleContent"></div>
            </div>
        </div>

        <!-- 改写结果 -->
        <div class="card" id="resultCard" style="display: none;">
            <div class="card-header">
                <h3>改写结果</h3>
                <div>
                    <span class="badge badge-info" id="usedStyle"></span>
                    <span class="badge badge-success" id="usedInspirations"></span>
                </div>
            </div>
            <div class="card-body">
                <div class="rewritten-content" id="rewrittenContent"></div>
                <div class="result-actions">
                    <button class="btn btn-primary" onclick="publishArticle()">
                        <i class="fas fa-paper-plane"></i> 发布文章
                    </button>
                    <button class="btn btn-secondary" onclick="copyContent()">
                        <i class="fas fa-copy"></i> 复制内容
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧：改写配置 -->
    <div class="rewrite-sidebar">
        <!-- 风格选择 -->
        <div class="card">
            <div class="card-header">
                <h3>改写风格</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <select id="styleSelect" class="form-control">
                        <option value="">加载中...</option>
                    </select>
                </div>
                <div class="style-info" id="styleInfo"></div>
            </div>
        </div>

        <!-- 灵感选择 -->
        <div class="card">
            <div class="card-header">
                <h3>参考灵感</h3>
                <span class="text-muted text-sm">选择最多5篇</span>
            </div>
            <div class="card-body">
                <div class="inspiration-filter">
                    <input type="text" id="inspirationSearch" class="form-control" 
                           placeholder="搜索灵感..." oninput="filterInspirations()">
                </div>
                <div class="inspiration-list" id="inspirationList">
                    <p class="text-muted">加载中...</p>
                </div>
                <div class="selected-count" id="selectedCount">
                    已选择: 0/5
                </div>
            </div>
        </div>

        <!-- 额外指令 -->
        <div class="card">
            <div class="card-header">
                <h3>额外指令</h3>
            </div>
            <div class="card-body">
                <textarea id="customInstructions" class="form-control" rows="4" 
                    placeholder="输入额外要求，例如：
• 增加数据支撑
• 语气更幽默
• 适合小白阅读
• 多用比喻说明"></textarea>
            </div>
        </div>

        <!-- 操作按钮 -->
        <button class="btn btn-primary btn-block btn-lg" onclick="startRewrite()" id="rewriteBtn">
            <i class="fas fa-magic"></i> 开始改写
        </button>
    </div>
</div>

<!-- 模板选择弹窗 -->
<div class="modal" id="publishModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>选择发布模板</h3>
            <button class="close-btn" onclick="closePublishModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="template-options" id="templateOptions"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
.rewrite-container {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 24px;
}

.rewrite-main {
    min-width: 0;
}

.rewrite-sidebar {
    position: sticky;
    top: 88px;
    height: fit-content;
}

.rewrite-sidebar .card {
    margin-bottom: 16px;
}

.article-info h4 {
    font-size: 18px;
    margin-bottom: 4px;
}

.article-content {
    max-height: 400px;
    overflow-y: auto;
    padding: 16px;
    background: var(--bg);
    border-radius: 8px;
    line-height: 1.8;
}

.rewritten-content {
    max-height: 500px;
    overflow-y: auto;
    padding: 20px;
    background: #f8fafc;
    border-radius: 8px;
    border: 1px solid var(--border);
    line-height: 1.8;
}

.style-info {
    margin-top: 12px;
    padding: 12px;
    background: var(--bg);
    border-radius: 8px;
    font-size: 13px;
}

.style-info p {
    margin: 0 0 8px 0;
    color: var(--text-muted);
}

.inspiration-filter {
    margin-bottom: 12px;
}

.inspiration-list {
    max-height: 300px;
    overflow-y: auto;
}

.inspiration-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 4px;
}

.inspiration-item:hover {
    background: var(--bg);
}

.inspiration-item.selected {
    background: #dbeafe;
    border: 1px solid var(--primary);
}

.inspiration-item input[type="checkbox"] {
    margin-top: 2px;
    width: 18px;
    height: 18px;
    cursor: pointer;
}

.inspiration-item-content {
    flex: 1;
    min-width: 0;
}

.inspiration-item-title {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.inspiration-item-source {
    font-size: 12px;
    color: var(--text-muted);
}

.selected-count {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-muted);
}

.selected-count.warning {
    color: var(--warning);
    font-weight: 500;
}

.result-actions {
    margin-top: 20px;
    display: flex;
    gap: 12px;
}

.btn-block {
    width: 100%;
}

.btn-lg {
    padding: 14px 24px;
    font-size: 16px;
}

.template-options {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
}

.template-option {
    padding: 20px;
    border: 2px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
}

.template-option:hover {
    border-color: var(--primary);
}

.template-option.selected {
    border-color: var(--primary);
    background: #dbeafe;
}

.template-option i {
    font-size: 32px;
    margin-bottom: 8px;
    color: var(--primary);
}

@media (max-width: 1024px) {
    .rewrite-container {
        grid-template-columns: 1fr;
    }
    .rewrite-sidebar {
        position: static;
    }
}
</style>

<script>
let articleId = null;
let styles = [];
let inspirations = [];
let selectedInspirations = new Set();
let rewrittenArticle = null;

// 初始化
async function init() {
    // 从URL获取文章ID
    const params = new URLSearchParams(window.location.search);
    articleId = params.get('id');
    
    if (!articleId) {
        alert('请提供文章ID');
        window.location.href = '/admin/articles';
        return;
    }
    
    document.getElementById('articleIdDisplay').textContent = `ID: ${articleId}`;
    
    await Promise.all([
        loadArticle(),
        loadStyles(),
        loadInspirations()
    ]);
}

// 加载文章
async function loadArticle() {
    try {
        const response = await fetch(`/api/articles/${articleId}`);
        const article = await response.json();
        
        document.getElementById('articleTitle').textContent = article.source_title;
        document.getElementById('articleAuthor').textContent = article.source_author || '未知作者';
        document.getElementById('articleContent').innerHTML = article.original_html || article.original_content;
    } catch (error) {
        console.error('加载文章失败:', error);
    }
}

// 加载风格
async function loadStyles() {
    try {
        const response = await fetch('/api/styles');
        styles = await response.json();
        
        const select = document.getElementById('styleSelect');
        select.innerHTML = styles.map(s => 
            `<option value="${s.id}">${s.name}</option>`
        ).join('');
        
        // 默认选中第一个
        if (styles.length > 0) {
            select.value = styles[0].id;
            showStyleInfo(styles[0]);
        }
        
        select.addEventListener('change', (e) => {
            const style = styles.find(s => s.id === e.target.value);
            showStyleInfo(style);
        });
    } catch (error) {
        console.error('加载风格失败:', error);
    }
}

function showStyleInfo(style) {
    document.getElementById('styleInfo').innerHTML = `
        <p>${style.description || '暂无描述'}</p>
        <div class="style-tags">
            <span class="badge">语气: ${style.tone}</span>
            <span class="badge">风格: ${style.style}</span>
            <span class="badge">温度: ${style.temperature}</span>
        </div>
    `;
}

// 加载灵感列表
async function loadInspirations() {
    try {
        const response = await fetch('/api/inspirations');
        inspirations = await response.json();
        renderInspirations();
    } catch (error) {
        console.error('加载灵感失败:', error);
    }
}

function renderInspirations() {
    const container = document.getElementById('inspirationList');
    const searchTerm = document.getElementById('inspirationSearch').value.toLowerCase();
    
    const filtered = inspirations.filter(i => 
        i.title.toLowerCase().includes(searchTerm) ||
        (i.content && i.content.toLowerCase().includes(searchTerm))
    );
    
    if (filtered.length === 0) {
        container.innerHTML = '<p class="text-muted">暂无灵感</p>';
        return;
    }
    
    container.innerHTML = filtered.map(insp => `
        <div class="inspiration-item ${selectedInspirations.has(insp.id) ? 'selected' : ''}" 
             onclick="toggleInspiration('${insp.id}')">
            <input type="checkbox" ${selectedInspirations.has(insp.id) ? 'checked' : ''} 
                   onclick="event.stopPropagation()">
            <div class="inspiration-item-content">
                <div class="inspiration-item-title">${insp.title || '无标题'}</div>
                <div class="inspiration-item-source">${insp.source_account || '未知来源'}</div>
            </div>
        </div>
    `).join('');
    
    updateSelectedCount();
}

function filterInspirations() {
    renderInspirations();
}

function toggleInspiration(id) {
    if (selectedInspirations.has(id)) {
        selectedInspirations.delete(id);
    } else {
        if (selectedInspirations.size >= 5) {
            alert('最多只能选择5篇参考灵感');
            return;
        }
        selectedInspirations.add(id);
    }
    renderInspirations();
}

function updateSelectedCount() {
    const count = selectedInspirations.size;
    const el = document.getElementById('selectedCount');
    el.textContent = `已选择: ${count}/5`;
    el.className = 'selected-count' + (count >= 5 ? ' warning' : '');
}

// 开始改写
async function startRewrite() {
    const btn = document.getElementById('rewriteBtn');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 改写中...';
    btn.disabled = true;
    
    const style = document.getElementById('styleSelect').value;
    const instructions = document.getElementById('customInstructions').value;
    const inspirationIds = Array.from(selectedInspirations);
    
    try {
        const response = await fetch(`/api/articles/${articleId}/rewrite`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                style: style,
                instructions: instructions,
                use_references: inspirationIds.length > 0,
                inspiration_ids: inspirationIds
            })
        });
        
        const article = await response.json();
        
        if (response.ok) {
            showRewriteResult(article);
        } else {
            alert('改写失败: ' + (article.error || '未知错误'));
        }
    } catch (error) {
        alert('改写失败: ' + error.message);
    } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
}

function showRewriteResult(article) {
    rewrittenArticle = article;
    
    document.getElementById('rewrittenContent').innerHTML = article.rewritten_html;
    document.getElementById('usedStyle').textContent = `风格: ${article.rewrite_style}`;
    
    const refCount = article.metadata?.reference_count || 0;
    document.getElementById('usedInspirations').textContent = `参考: ${refCount}篇`;
    
    document.getElementById('resultCard').style.display = 'block';
    document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
}

// 复制内容
function copyContent() {
    const content = document.getElementById('rewrittenContent').innerText;
    navigator.clipboard.writeText(content).then(() => {
        alert('内容已复制到剪贴板');
    });
}

// 发布文章
async function publishArticle() {
    // 加载模板列表
    try {
        const response = await fetch('/api/templates');
        const templates = await response.json();
        
        const container = document.getElementById('templateOptions');
        container.innerHTML = Object.entries(templates).map(([key, t]) => `
            <div class="template-option" onclick="doPublish('${key}')">
                <i class="fas fa-file-alt"></i>
                <div><strong>${t.name}</strong></div>
                <div class="text-muted text-sm">${t.description}</div>
            </div>
        `).join('');
        
        document.getElementById('publishModal').classList.add('show');
    } catch (error) {
        alert('加载模板失败');
    }
}

async function doPublish(template) {
    try {
        const response = await fetch(`/api/articles/${articleId}/publish`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ template })
        });
        
        const result = await response.json();
        
        if (response.ok) {
            alert('发布成功！');
            closePublishModal();
        } else {
            alert('发布失败: ' + (result.error || '未知错误'));
        }
    } catch (error) {
        alert('发布失败: ' + error.message);
    }
}

function closePublishModal() {
    document.getElementById('publishModal').classList.remove('show');
}

// 初始化
document.addEventListener('DOMContentLoaded', init);
</script>
{% endblock %}
