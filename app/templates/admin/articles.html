{% extends "admin/base.html" %}

{% block title %}文章管理 - AutoPlatform{% endblock %}
{% block page_title %}文章管理{% endblock %}

{% block header_actions %}
<button class="btn btn-primary" onclick="loadArticles()">
    <i class="fas fa-sync"></i> 刷新
</button>
{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3>文章列表</h3>
        <div class="filter-tabs">
            <button class="tab-btn active" data-status="">全部</button>
            <button class="tab-btn" data-status="pending">待改写</button>
            <button class="tab-btn" data-status="rewritten">已改写</button>
            <button class="tab-btn" data-status="published">已发布</button>
        </div>
    </div>
    <div class="card-body">
        <table class="data-table">
            <thead>
                <tr>
                    <th>标题</th>
                    <th>来源</th>
                    <th>状态</th>
                    <th>改写风格</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="articleList">
                <tr>
                    <td colspan="6" class="text-center text-muted">加载中...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
.filter-tabs {
    display: flex;
    gap: 8px;
}

.status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

.status-badge::before {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: currentColor;
}

.status-pending { color: #f59e0b; }
.status-rewriting { color: #3b82f6; }
.status-rewritten { color: #8b5cf6; }
.status-publishing { color: #ec4899; }
.status-published { color: #10b981; }
.status-failed { color: #ef4444; }

.article-title {
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
</style>

<script>
let currentFilter = '';

// 状态映射
const statusMap = {
    'pending': { label: '待改写', class: 'status-pending' },
    'rewriting': { label: '改写中', class: 'status-rewriting' },
    'rewritten': { label: '已改写', class: 'status-rewritten' },
    'publishing': { label: '发布中', class: 'status-publishing' },
    'published': { label: '已发布', class: 'status-published' },
    'failed': { label: '失败', class: 'status-failed' }
};

async function loadArticles() {
    try {
        const response = await fetch('/api/articles');
        const articles = await response.json();
        renderArticles(articles);
    } catch (error) {
        console.error('加载文章失败:', error);
        document.getElementById('articleList').innerHTML = `
            <tr><td colspan="6" class="text-center text-danger">加载失败</td></tr>
        `;
    }
}

function renderArticles(articles) {
    const tbody = document.getElementById('articleList');
    
    // 过滤
    let filtered = articles;
    if (currentFilter) {
        filtered = articles.filter(a => a.status === currentFilter);
    }
    
    if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted">暂无文章</td></tr>`;
        return;
    }
    
    tbody.innerHTML = filtered.map(article => {
        const status = statusMap[article.status] || { label: article.status, class: '' };
        const date = new Date(article.created_at).toLocaleDateString('zh-CN');
        
        return `
            <tr>
                <td>
                    <div class="article-title" title="${article.source_title}">
                        ${article.source_title || '无标题'}
                    </div>
                </td>
                <td>${article.source_author || '-'}</td>
                <td>
                    <span class="status-badge ${status.class}">${status.label}</span>
                </td>
                <td>
                    ${article.rewrite_style ? 
                        `<span class="badge badge-info">${article.rewrite_style}</span>` : 
                        '<span class="text-muted">-</span>'}
                </td>
                <td>${date}</td>
                <td>
                    <div class="action-btns">
                        ${getActionButtons(article)}
                    </div>
                </td>
            </tr>
        `;
    }).join('');
}

function getActionButtons(article) {
    const buttons = [];
    
    if (article.status === 'pending' || article.status === 'failed') {
        buttons.push(`
            <a href="/admin/rewrite?id=${article.id}" class="btn-icon" title="改写">
                <i class="fas fa-magic"></i>
            </a>
        `);
    } else if (article.status === 'rewritten') {
        buttons.push(`
            <a href="/admin/rewrite?id=${article.id}" class="btn-icon" title="查看改写">
                <i class="fas fa-eye"></i>
            </a>
            <button class="btn-icon" onclick="publishArticle('${article.id}')" title="发布">
                <i class="fas fa-paper-plane"></i>
            </button>
        `);
    } else if (article.status === 'published') {
        buttons.push(`
            <button class="btn-icon" onclick="viewDraft('${article.wechat_draft_id}')" title="查看草稿">
                <i class="fas fa-external-link-alt"></i>
            </button>
        `);
    }
    
    return buttons.join('');
}

async function publishArticle(articleId) {
    if (!confirm('确定要发布这篇文章吗？')) return;
    
    try {
        const response = await fetch(`/api/articles/${articleId}/publish`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ template: 'default' })
        });
        
        if (response.ok) {
            alert('发布成功！');
            loadArticles();
        } else {
            const error = await response.json();
            alert('发布失败: ' + (error.error || '未知错误'));
        }
    } catch (error) {
        alert('发布失败: ' + error.message);
    }
}

function viewDraft(draftId) {
    if (draftId) {
        window.open(`https://mp.weixin.qq.com/`, '_blank');
    } else {
        alert('暂无草稿链接');
    }
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
    loadArticles();
    
    // 过滤按钮
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.status;
            loadArticles();
        });
    });
});
</script>
{% endblock %}
