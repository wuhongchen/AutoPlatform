<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AutoPlatform 管理后台{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-robot"></i>
                <span>AutoPlatform</span>
            </div>
            <nav class="nav-menu">
                <a href="/admin/dashboard" class="nav-item {% if active_menu == 'dashboard' %}active{% endif %}">
                    <i class="fas fa-home"></i>
                    <span>概览</span>
                </a>
                <a href="/admin/accounts" class="nav-item {% if active_menu == 'accounts' %}active{% endif %}">
                    <i class="fas fa-users"></i>
                    <span>账户管理</span>
                </a>
                <a href="/admin/articles" class="nav-item {% if active_menu == 'articles' %}active{% endif %}">
                    <i class="fas fa-file-alt"></i>
                    <span>文章管理</span>
                </a>
                <a href="/admin/inspirations" class="nav-item {% if active_menu == 'inspirations' %}active{% endif %}">
                    <i class="fas fa-lightbulb"></i>
                    <span>灵感库</span>
                </a>
                <a href="/admin/styles" class="nav-item {% if active_menu == 'styles' %}active{% endif %}">
                    <i class="fas fa-paint-brush"></i>
                    <span>AI 改写风格</span>
                </a>
                <a href="/admin/pipeline" class="nav-item {% if active_menu == 'pipeline' %}active{% endif %}">
                    <i class="fas fa-stream"></i>
                    <span>流水线</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <header class="header">
                <h1>{% block page_title %}{% endblock %}</h1>
                <div class="header-actions">
                    {% block header_actions %}{% endblock %}
                </div>
            </header>
            
            <div class="content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
